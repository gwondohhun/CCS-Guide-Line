<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRI 파라미터 가이드</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #ffa657;
    --siemens: #009999;
    --philips: #0072ff;
    --ge: #5f2ee5;
    --canon: #e50000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* TOP BAR */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .logo { font-weight: 700; font-size: 15px; color: var(--blue); letter-spacing: -0.3px; }
  .logo span { color: var(--text2); font-weight: 400; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 13px; transition: all .15s; }
  .tab.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  .tab:hover:not(.on) { background: var(--surface2); color: var(--text); }

  /* MAIN LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px 8px; gap: 4px; flex-shrink: 0; overflow-y: auto; }
  .sidebar-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; }
  .pb { width: 100%; text-align: left; padding: 7px 10px; border-radius: 6px; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 13px; transition: all .15s; }
  .pb.on { background: var(--surface2); color: var(--blue); font-weight: 600; }
  .pb:hover:not(.on) { background: var(--surface2); color: var(--text); }

  /* CHAT PANEL */
  #chatPanel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; line-height: 1.6; }
  .msg.user { background: var(--blue); color: #fff; align-self: flex-end; border-radius: 10px 10px 2px 10px; }
  .msg.ai { background: var(--surface2); border: 1px solid var(--border); align-self: flex-start; border-radius: 10px 10px 10px 2px; }
  .msg.loading { color: var(--text2); }
  .msg h4 { color: var(--blue); margin: 8px 0 4px; font-size: 13px; }
  .msg ul { padding-left: 18px; margin: 4px 0; }
  .msg li { margin: 2px 0; }
  .msg strong { color: var(--orange); }
  .plabel { font-size: 11px; color: var(--text2); padding: 4px 16px; }
  .chat-input { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .chat-input textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; resize: none; outline: none; font-family: inherit; max-height: 80px; }
  .chat-input textarea:focus { border-color: var(--blue); }
  #sbtn { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #sbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .img-row { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; background: var(--surface); border-top: 1px solid var(--border); }
  .img-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
  .img-thumb.sel { border-color: var(--blue); }
  .img-clear { font-size: 11px; color: var(--text2); cursor: pointer; align-self: center; white-space: nowrap; }
  .img-clear:hover { color: var(--red); }

  /* DB PANEL */
  #dbPanel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #dbPanel.on { display: flex; }
  .db-top { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  #dbSearch { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px; outline: none; width: 220px; }
  #dbSearch:focus { border-color: var(--blue); }
  .df { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 12px; }
  .df.on { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,0.08); }
  .db-content { flex: 1; overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; align-content: start; }
  .db-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
  .db-card:hover { border-color: var(--blue); }
  .db-card-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; }
  .db-cat-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .tag-brain { background: rgba(188,140,255,.15); color: var(--purple); }
  .tag-spine { background: rgba(63,185,80,.15); color: var(--green); }
  .tag-msk { background: rgba(255,166,87,.15); color: var(--orange); }
  .tag-field { background: rgba(248,81,73,.15); color: var(--red); }
  .db-card-name { font-size: 13px; font-weight: 600; flex: 1; }
  .db-card-body { padding: 0 14px 12px; display: none; }
  .db-card-body.open { display: block; }
  .db-detail { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .db-detail b { color: var(--text); }
  .db-count { font-size: 12px; color: var(--text2); margin-left: auto; }
  .db-empty { grid-column: 1/-1; text-align: center; color: var(--text2); padding: 40px; }

  /* Vendor tags */
  .vtag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; margin: 0 2px; }
  .vs { background: rgba(0,153,153,.2); color: var(--siemens); }
  .vp { background: rgba(0,114,255,.2); color: var(--philips); }
  .vg { background: rgba(95,46,229,.2); color: var(--ge); }
  .vc { background: rgba(229,0,0,.2); color: var(--canon); }

  /* IMG SLIDER */
  .img-slider { margin-top: 8px; }
  .img-slider-main { width: 100%; max-height: 180px; object-fit: contain; border-radius: 6px; background: #000; }
  .img-dots { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
  .img-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); cursor: pointer; }
  .img-dot.on { background: var(--blue); }
  .ai-btn { margin-top: 8px; font-size: 11px; padding: 4px 10px; border: 1px solid var(--blue); border-radius: 5px; background: none; color: var(--blue); cursor: pointer; }
  .ai-btn:hover { background: rgba(88,166,255,.1); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">MRI Guide <span>by AiRSMed CCS</span></div>
  <div class="tabs">
    <button class="tab on" id="tabChat" onclick="switchTab('chat')">💬 AI 질문</button>
    <button class="tab" id="tabDB" onclick="switchTab('db')">📋 이슈 DB</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">부위 선택</div>
    <button class="pb on" data-part="all" onclick="setPart(this)">🔍 전체</button>
    <button class="pb" data-part="Brain" onclick="setPart(this)">🧠 Brain</button>
    <button class="pb" data-part="C-Spine" onclick="setPart(this)">🦴 C-Spine</button>
    <button class="pb" data-part="T-Spine" onclick="setPart(this)">🦴 T-Spine</button>
    <button class="pb" data-part="L-Spine" onclick="setPart(this)">🦴 L-Spine</button>
    <button class="pb" data-part="Whole Spine" onclick="setPart(this)">🦴 Whole Spine</button>
    <button class="pb" data-part="Shoulder" onclick="setPart(this)">💪 Shoulder</button>
    <button class="pb" data-part="Knee" onclick="setPart(this)">🦵 Knee</button>
    <button class="pb" data-part="Hip" onclick="setPart(this)">🦵 Hip</button>
    <button class="pb" data-part="Ankle" onclick="setPart(this)">🦶 Ankle</button>
    <button class="pb" data-part="Wrist" onclick="setPart(this)">🤝 Wrist</button>
    <button class="pb" data-part="Elbow" onclick="setPart(this)">💪 Elbow</button>
    <button class="pb" data-part="Foot" onclick="setPart(this)">🦶 Foot</button>
    <button class="pb" data-part="Abdomen" onclick="setPart(this)">🫁 Abdomen</button>
  </div>

  <!-- CHAT PANEL -->
  <div id="chatPanel">
    <div class="plabel" id="plabel">· 전체 부위</div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="msg ai">안녕하세요! MRI 파라미터 및 아티팩트에 대해 질문해주세요.<br>부위를 선택하거나 이미지를 첨부할 수 있어요.</div>
    </div>
    <div class="img-row" id="imgRow" style="display:none">
      <span class="img-clear" onclick="clearImgs()">✕ 이미지 삭제</span>
    </div>
    <div class="chat-input">
      <textarea id="qinput" placeholder="파라미터, artifact, 이슈 등 질문하세요..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask();}"></textarea>
      <label style="cursor:pointer;display:flex;align-items:center;color:var(--text2);font-size:18px" title="이미지 첨부">
        📎<input type="file" accept="image/*" multiple style="display:none" onchange="addImgs(this)">
      </label>
      <button id="sbtn" onclick="ask()">전송</button>
    </div>
  </div>

  <!-- DB PANEL -->
  <div id="dbPanel">
    <div class="db-top">
      <input id="dbSearch" type="text" placeholder="이슈 검색..." oninput="renderDB()">
      <button class="df on" data-cat="all" onclick="setDBCat(this)">전체</button>
      <button class="df" data-cat="brain" onclick="setDBCat(this)">Brain</button>
      <button class="df" data-cat="spine" onclick="setDBCat(this)">Spine</button>
      <button class="df" data-cat="msk" onclick="setDBCat(this)">MSK</button>
      <button class="df" data-cat="field" onclick="setDBCat(this)">현장사례</button>
      <span class="db-count" id="dbCount"></span>
    </div>
    <div class="db-content" id="dbContent"></div>
  </div>
</div>

// ============ PARAMETER GUIDELINES (System Prompt) ============
const SYS = `당신은 MRI 파라미터 전문가입니다. AiRSMed CCS팀 가이드라인을 기반으로 답변합니다.

=== 공통 원칙 ===
1. PAT 명칭: Philips=SENSE/CS-SENSE, Siemens=GRAPPA, GE=ASSET/ARC, Canon=SPEEDER/RAPID
2. TE는 특별한 경우 외 원본 파라미터 유지 권장
3. Slice OS(Oversampling)은 10% 이상 유지
4. Recon은 ACQ의 약 50%로 설정 (Siemens: Slice resolution 50%, Philips: Recon Voxel, GE: ZIP2, Canon: Fine recon ON)
5. Drive 기능(TR 증가 시): Siemens=Restore / Philips=Drive / GE=Fast Recovery / Canon=T2 Plus
6. Echo spacing은 bandwidth에 sync / ETD=ETL×ES / ETD 초과 시 image quality 저하

=== BRAIN 파라미터 ===
[T1WI / 2D TSE or SE]
TE: 최솟값(9-15ms) / TR: 400-700ms / Freq voxel: 0.7-1.0mm
PAT: Philips SENSE off-1.7 / Siemens GRAPPA off-2 / GE off-2 / Canon off-1.7
T1WI WM contrast 개선: TE 9.4ms / TR 620ms 권장

[T1 FLAIR / T1 IR TSE]
TE: 9-15ms / TR: 2000-9000ms / TI: TR에 따라 조정 (TR 9000 → TI 2500)
ETD: 90ms 이하 / ETL: 6-10 / Echo spacing: 8-11ms
Siemens: freeze 기능 사용 / GE: TI Auto / Philips: TI VALUE TABLE 참조

[T2WI / 2D TSE]
TE: 90-120ms / TR: 3000-6000ms / Freq voxel: 0.7-1.0mm
ETD: 180-240ms / ETL: 15-26

[T2 FLAIR]
TE: 90-120ms / TR: 7000-9000ms / TI: 2500ms 내외
ETD: 180-240ms / ETL: 15-26

[DWI / EPI]
TE: 최솟값 / TR: 4000-8000ms / b-value: 0, 1000 (or 500, 1000)
PAT: 최대 3 / FOV: 350 이하 권장 / MUSE 사용 시 artifact 감소

[TOF / 3D GRE]
TE: out-of-phase (3T: ~2.3ms, 1.5T: ~4.6ms) / TR: 20-35ms
Voxel slice: 0.6mm 이하 권장 / SPF: off 권장

[SWI / 3D GRE]
TE: 19-23ms (3T) / TR: 27-35ms / FA: 15°
PAT: Philips SENSE 2 / Siemens GRAPPA 2

[T2* GRE]
TE: 14-20ms / TR: 450-800ms / FA: 20-30° (원본유지)

현장 이슈 해결 사례:
- Philips eTHRIVE Dynamic CS: Head Base Coil 없으면 SENSE로 변경
- 강북삼성 Motion Free (Philips 3T): Phase Oversampling 동일설정 (v3.0.13.3+에서 수정됨)
- TOF MIP 혈관끊김 (국제성모): SPF off → 해결
- GE MR30.1 소스리턴 (인천건협): 장비 재등록
- Shoulder FS 불량: ES 낮춤 + shim FOV 맞춤
- GE 1.5T HD16: NPW + ASSET/ARC 동시사용 불가
- 광주미래 Abdomen DWI: scan item 재등록
- Siemens 복부 slice 신호꺼짐: Fat saturation 확인
- Brain T1WI WM contrast: TE 9.4ms / TR 620ms
- GE Pioneer Real Time Field Adjustment: CCS팀 문의
- Philips 3D T1 TFE: CS SENSE + Head Base Coil 확인
- Philips DWI EPI distortion: PAT 증가 / MUSE 적용

한국어로 간결·실용적 답변. 제조사별 차이 구분. 수치범위 명확히. artifact 질문 시 원인과 해결방법 함께 제시.`;

// ============ STATE ============
const CAT_LABEL = {brain:'Brain / Neuro', spine:'Spine', msk:'MSK', field:'현장 이슈 사례'};
const CAT_TAG_CLASS = {brain:'tag-brain', spine:'tag-spine', msk:'tag-msk', field:'tag-field'};
let part = 'all', busy = false, uploadedImgs = [], dbCat = 'all';

// ============ TAB SWITCH ============
function switchTab(tab) {
  document.getElementById('chatPanel').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('dbPanel').classList.toggle('on', tab === 'db');
  document.getElementById('tabChat').classList.toggle('on', tab === 'chat');
  document.getElementById('tabDB').classList.toggle('on', tab === 'db');
  if (tab === 'db') renderDB();
}

// ============ PART SELECT ============
function setPart(el) {
  document.querySelectorAll('.pb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  part = el.dataset.part;
  document.getElementById('plabel').textContent = '· ' + (part === 'all' ? '전체 부위' : part);
}

// ============ IMAGE UPLOAD ============
function addImgs(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImgs.push({src: e.target.result, name: file.name});
      loaded++;
      if (loaded === files.length) renderImgRow();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderImgRow() {
  const row = document.getElementById('imgRow');
  const existing = row.querySelectorAll('.img-thumb');
  existing.forEach(el => el.remove());
  uploadedImgs.forEach((img, i) => {
    const el = document.createElement('img');
    el.src = img.src;
    el.className = 'img-thumb' + (i === 0 ? ' sel' : '');
    el.onclick = () => {
      row.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('sel'));
      el.classList.add('sel');
    };
    row.insertBefore(el, row.lastElementChild);
  });
  row.style.display = uploadedImgs.length ? 'flex' : 'none';
}

function clearImgs() {
  uploadedImgs = [];
  document.getElementById('imgRow').style.display = 'none';
  document.getElementById('imgRow').querySelectorAll('.img-thumb').forEach(el => el.remove());
}

// ============ CHAT ============
async function ask() {
  if (busy) return;
  const q = document.getElementById('qinput').value.trim();
  const selImg = document.querySelector('.img-thumb.sel');
  if (!q && !selImg) return;

  busy = true;
  document.getElementById('sbtn').disabled = true;
  const ch = document.getElementById('chatMsgs');

  if (q) {
    const um = document.createElement('div');
    um.className = 'msg user';
    um.textContent = (part !== 'all' ? `[${part}] ` : '') + q;
    ch.appendChild(um);
    document.getElementById('qinput').value = '';
  }

  const msgId = 'ai_' + Date.now();
  const am = document.createElement('div');
  am.className = 'msg ai loading';
  am.id = msgId;
  am.textContent = '답변 생성 중...';
  ch.appendChild(am);
  ch.scrollTop = ch.scrollHeight;

  const partCtx = part !== 'all' ? `[${part} 부위 관련 질문]\n` : '';
  const userText = partCtx + (q || '이 MRI 이미지에서 artifact를 찾아 원인과 해결 방법을 알려주세요.');

  try {
    let messageContent;
    if (selImg) {
      const b64 = selImg.src.split(',')[1];
      const mime = selImg.src.split(';')[0].split(':')[1];
      messageContent = [
        {type: 'image', source: {type: 'base64', media_type: mime, data: b64}},
        {type: 'text', text: userText}
      ];
    } else {
      messageContent = userText;
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYS,
        messages: [{role: 'user', content: messageContent}]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'HTTP ' + res.status);
    const txt = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '답변 없음';
    const ac = document.getElementById(msgId);
    if (ac) { ac.classList.remove('loading'); ac.innerHTML = fmt(txt); }
  } catch(e) {
    const ac = document.getElementById(msgId);
    if (ac) { ac.classList.remove('loading'); ac.innerHTML = `<span style="color:var(--red)">오류: ${e.message}</span>`; }
  }

  busy = false;
  document.getElementById('sbtn').disabled = false;
  ch.scrollTop = ch.scrollHeight;
}

function fmt(t) {
  return t
    .replace(/\*\*(Siemens[^*]*)\*\*/g, '<span class="vtag vs">$1</span>')
    .replace(/\*\*(Philips[^*]*)\*\*/g, '<span class="vtag vp">$1</span>')
    .replace(/\*\*(GE[^*]*)\*\*/g, '<span class="vtag vg">$1</span>')
    .replace(/\*\*(Canon[^*]*)\*\*/g, '<span class="vtag vc">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<h4>$1</h4>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[^<]*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
}

// ============ DB RENDER ============
function setDBCat(el) {
  document.querySelectorAll('.df').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  dbCat = el.dataset.cat;
  renderDB();
}

function renderDB() {
  const q = document.getElementById('dbSearch').value.toLowerCase();
  const content = document.getElementById('dbContent');
  let html = '';
  let total = 0;

  const cats = dbCat === 'all' ? Object.keys(ISSUES) : [dbCat];

  cats.forEach(cat => {
    ISSUES[cat].forEach((issue, idx) => {
      const nameMatch = issue.name.toLowerCase().includes(q);
      const causeMatch = (issue.cause||'').toLowerCase().includes(q);
      const solMatch = (issue.solution||'').toLowerCase().includes(q);
      if (q && !nameMatch && !causeMatch && !solMatch) return;
      total++;
      const cardId = `card_${cat}_${idx}`;
      const bodyId = `body_${cat}_${idx}`;
      html += `
        <div class="db-card" id="${cardId}" onclick="toggleCard('${bodyId}')">
          <div class="db-card-head">
            <span class="db-cat-tag ${CAT_TAG_CLASS[cat]}">${cat === 'field' ? '현장' : cat.toUpperCase()}</span>
            <span class="db-card-name">${issue.name}</span>
          </div>
          <div class="db-card-body" id="${bodyId}">
            <div class="db-detail">
              ${issue.cause ? `<b>원인:</b> ${issue.cause.replace(/\n/g,'<br>')}` : ''}
              ${issue.solution ? `<br><b>해결:</b> ${issue.solution.replace(/\n/g,'<br>')}` : ''}
              ${issue.tip ? `<br><b>팁:</b> ${issue.tip}` : ''}
            </div>
            ${issue.images ? renderSlider(issue.images, cardId) : ''}
            <button class="ai-btn" onclick="event.stopPropagation();askFromDB('${issue.name.replace(/'/g,"\\'")}')">💬 AI에게 더 물어보기</button>
          </div>
        </div>`;
    });
  });

  if (!html) html = '<div class="db-empty">검색 결과가 없습니다.</div>';
  content.innerHTML = html;
  document.getElementById('dbCount').textContent = `${total}건`;
}

function renderSlider(images, prefix) {
  if (!images || images.length === 0) return '';
  if (images.length === 1) {
    return `<div class="img-slider"><img class="img-slider-main" src="${images[0]}" alt="예시 이미지"></div>`;
  }
  const dots = images.map((_, i) => `<span class="img-dot${i===0?' on':''}" onclick="event.stopPropagation();slideImg('${prefix}',${i},${images.length})"></span>`).join('');
  return `<div class="img-slider">
    <img class="img-slider-main" id="${prefix}_slider" src="${images[0]}" alt="예시 이미지">
    <div class="img-dots">${dots}</div>
  </div>`;
}

function slideImg(prefix, idx, total) {
  const img = document.getElementById(prefix + '_slider');
  const dots = document.querySelectorAll(`#${prefix} .img-dot`);
  // Note: actual images would be in the data; this is placeholder
  dots.forEach((d, i) => d.classList.toggle('on', i === idx));
}

function toggleCard(bodyId) {
  const body = document.getElementById(bodyId);
  if (body) body.classList.toggle('open');
}

function askFromDB(name) {
  switchTab('chat');
  document.getElementById('qinput').value = name + '에 대해 자세히 설명해주세요.';
  ask();
}

// Initial render
renderDB();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRI Parameter Guide — AIRS Medical</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--surf:#111827;--surf2:#1a2234;--surf3:#212d42;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.12);--tx:#e8ecf4;--muted:#6b7a99;--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--blue-bdr:rgba(59,130,246,0.3);--vs-bg:rgba(59,130,246,0.15);--vs-tx:#93c5fd;--vp-bg:rgba(16,185,129,0.15);--vp-tx:#6ee7b7;--vg-bg:rgba(245,158,11,0.15);--vg-tx:#fcd34d;--vc-bg:rgba(244,114,182,0.15);--vc-tx:#f9a8d4;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;}

/* Sidebar */
.sb{width:220px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;}
.sb::-webkit-scrollbar{width:3px;}.sb::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
.brand{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.brand-ico{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-ico svg{width:18px;height:18px;fill:#e0f0ff;}
.brand-name{font-size:13px;font-weight:600;color:var(--tx);}
.brand-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}

/* Tab switcher */
.tab-switch{display:flex;margin:10px 10px 6px;background:var(--surf2);border-radius:8px;padding:3px;}
.tab-btn{flex:1;padding:6px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;transition:all .15s;}
.tab-btn.on{background:var(--blue-dim);color:var(--blue);}

.sb-sec{padding:10px 10px 4px;}
.sb-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 6px;margin-bottom:4px;}
.pb{width:100%;display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid transparent;border-radius:7px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:left;transition:all .13s;margin-bottom:2px;}
.pb:hover{background:var(--surf2);color:var(--tx);}
.pb.on{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-bdr);}
.pb .dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.pb.on .dot{background:var(--blue);}
.sb-div{height:1px;background:var(--bdr);margin:6px 10px;}
.vleg{margin:6px 10px 10px;padding:9px 11px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;}
.vleg-t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.vrow{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;color:var(--muted);}
.vdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:12px 20px;border-bottom:1px solid var(--bdr);background:var(--surf);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-l{font-size:13px;color:var(--muted);}
.tb-l strong{color:var(--tx);font-weight:500;}
.tb-r{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.live{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Chat panel */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:var(--bg);}
.chat::-webkit-scrollbar{width:4px;}.chat::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;padding:40px 20px;}
.empty-ico{width:56px;height:56px;background:var(--blue-dim);border:1px solid var(--blue-bdr);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.empty-ico svg{width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.5;}
.empty h2{font-size:18px;font-weight:500;color:var(--tx);}
.empty p{font-size:13px;color:var(--muted);max-width:340px;line-height:1.65;}
.qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;width:100%;max-width:520px;}
.qb{padding:10px 12px;background:var(--surf);border:1px solid var(--bdr2);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;}
.qb:hover{background:var(--surf2);color:var(--tx);border-color:var(--blue-bdr);}
.ql{display:block;font-size:10px;color:var(--blue);font-weight:600;letter-spacing:.04em;margin-bottom:3px;}
.msg-u{display:flex;justify-content:flex-end;animation:fu .18s ease;}
.bubble{background:var(--blue);color:#fff;padding:9px 14px;border-radius:14px 14px 4px 14px;font-size:13px;max-width:70%;line-height:1.55;}
.msg-a{display:flex;gap:10px;align-items:flex-start;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.av{width:30px;height:30px;background:var(--blue-dim);border:1px solid var(--blue-bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.av svg{width:15px;height:15px;stroke:var(--blue);fill:none;stroke-width:2;}
.acard{flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:3px 14px 14px 14px;padding:13px 16px;font-size:13px;line-height:1.75;color:var(--tx);min-width:0;}
.acard.loading{color:var(--muted);display:flex;align-items:center;gap:8px;}
.acard h4{font-size:12px;font-weight:600;color:var(--tx);margin:11px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--bdr);}
.acard h4:first-child{margin-top:0;}
.acard ul{padding-left:1.1rem;margin:3px 0 7px;}
.acard li{margin-bottom:3px;}
.acard strong{font-weight:500;}
.vtag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;margin:0 2px;font-family:'DM Mono',monospace;}
.vs{background:var(--vs-bg);color:var(--vs-tx);}
.vp{background:var(--vp-bg);color:var(--vp-tx);}
.vg{background:var(--vg-bg);color:var(--vg-tx);}
.vc{background:var(--vc-bg);color:var(--vc-tx);}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);margin:0 2px;animation:db 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-4px);opacity:1;}}
.iarea{padding:12px 20px 16px;background:var(--surf);border-top:1px solid var(--bdr);flex-shrink:0;}
.img-preview{display:none;margin-bottom:8px;}
.ibox{display:flex;gap:8px;align-items:flex-end;background:var(--surf2);border:1px solid var(--bdr2);border-radius:13px;padding:9px 11px 9px 14px;transition:border-color .15s;}
.ibox:focus-within{border-color:var(--blue-bdr);}
.img-btn{display:flex;align-items:center;cursor:pointer;padding:0 3px;flex-shrink:0;opacity:.5;transition:opacity .15s;}
.img-btn:hover{opacity:1;}
.ibox textarea{flex:1;border:none;outline:none;background:transparent;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;line-height:1.5;min-height:22px;max-height:100px;}
.ibox textarea::placeholder{color:var(--muted);}
.sbtn{width:34px;height:34px;background:var(--blue);border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.sbtn:hover{opacity:.85;transform:scale(1.04);}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.sbtn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;}
.hint{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;}
.hint kbd{background:var(--surf3);border:1px solid var(--bdr2);border-radius:3px;padding:1px 4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* Issue DB panel */
.db-panel{flex:1;display:none;flex-direction:column;overflow:hidden;}
.db-panel.on{display:flex;}
.db-toolbar{padding:12px 20px;border-bottom:1px solid var(--bdr);background:var(--surf);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.db-search{flex:1;background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;padding:7px 12px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.db-search::placeholder{color:var(--muted);}
.db-search:focus{border-color:var(--blue-bdr);}
.db-filter{display:flex;gap:6px;}
.df{padding:5px 12px;border:1px solid var(--bdr2);border-radius:20px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .13s;}
.df:hover{background:var(--surf2);color:var(--tx);}
.df.on{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-bdr);}
.db-content{flex:1;overflow-y:auto;padding:20px;}
.db-content::-webkit-scrollbar{width:4px;}.db-content::-webkit-scrollbar-thumb{background:var(--bdr2);}
.db-section{margin-bottom:24px;}
.db-section-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr);}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;}
.issue-card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;cursor:pointer;transition:all .15s;}
.issue-card:hover{border-color:var(--bdr2);background:var(--surf2);}
.issue-card.expanded{border-color:var(--blue-bdr);background:var(--surf2);}
.issue-name{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:4px;line-height:1.4;}
.issue-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.tag-brain{background:rgba(139,92,246,.15);color:#a78bfa;}
.tag-spine{background:rgba(16,185,129,.15);color:#6ee7b7;}
.tag-msk{background:rgba(245,158,11,.15);color:#fcd34d;}
.tag-field{background:rgba(239,68,68,.15);color:#fca5a5;}
.issue-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);}
.issue-card.expanded .issue-detail{display:block;}
.detail-row{display:flex;gap:8px;margin-bottom:6px;font-size:12px;line-height:1.5;}
.detail-label{color:var(--muted);flex-shrink:0;width:36px;}
.detail-val{color:var(--tx);}
.detail-val .vtag{font-size:10px;}
.ask-btn{margin-top:10px;width:100%;padding:7px;background:var(--blue-dim);border:1px solid var(--blue-bdr);border-radius:7px;color:var(--blue);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.ask-btn:hover{background:var(--blue);color:#fff;}
.no-result{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}

/* Drop overlay */
.drop-overlay{display:none;position:fixed;inset:0;background:rgba(59,130,246,.08);border:3px dashed var(--blue);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:none;}
.drop-overlay.on{display:flex;}
.drop-overlay p{font-size:16px;font-weight:500;color:var(--blue);}
@media(max-width:680px){.sb{display:none;}.qgrid{grid-template-columns:1fr;}.db-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="drop-overlay" id="dropOverlay">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  <p>이미지를 놓으면 artifact 분석을 시작합니다</p>
</div>
<div class="layout">
  <aside class="sb">
    <div class="brand">
      <div class="brand-ico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
      <div><div class="brand-name">MRI Param Guide</div><div class="brand-sub">AIRS Medical CCS</div></div>
    </div>
    <div class="tab-switch">
      <button class="tab-btn on" id="tabChat" onclick="switchTab('chat')">💬 질문</button>
      <button class="tab-btn" id="tabDB" onclick="switchTab('db')">📋 이슈 DB</button>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">부위 선택</div>
      <button class="pb on" data-part="all" onclick="setPart(this)"><span class="dot"></span>전체</button>
      <button class="pb" data-part="Brain" onclick="setPart(this)"><span class="dot"></span>Brain</button>
      <button class="pb" data-part="Cervical Spine" onclick="setPart(this)"><span class="dot"></span>Cervical Spine</button>
      <button class="pb" data-part="Thoracic Spine" onclick="setPart(this)"><span class="dot"></span>Thoracic Spine</button>
      <button class="pb" data-part="Lumbar Spine" onclick="setPart(this)"><span class="dot"></span>Lumbar Spine</button>
      <button class="pb" data-part="Whole Spine" onclick="setPart(this)"><span class="dot"></span>Whole Spine</button>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">MSK</div>
      <button class="pb" data-part="Shoulder" onclick="setPart(this)"><span class="dot"></span>Shoulder</button>
      <button class="pb" data-part="Elbow" onclick="setPart(this)"><span class="dot"></span>Elbow</button>
      <button class="pb" data-part="Wrist" onclick="setPart(this)"><span class="dot"></span>Wrist</button>
      <button class="pb" data-part="Hip Joint" onclick="setPart(this)"><span class="dot"></span>Hip Joint</button>
      <button class="pb" data-part="Knee" onclick="setPart(this)"><span class="dot"></span>Knee</button>
      <button class="pb" data-part="Ankle" onclick="setPart(this)"><span class="dot"></span>Ankle</button>
      <button class="pb" data-part="Foot" onclick="setPart(this)"><span class="dot"></span>Foot</button>
    </div>
    <div class="sb-div"></div>
    <div class="vleg">
      <div class="vleg-t">제조사</div>
      <div class="vrow"><div class="vdot" style="background:#3b82f6"></div>Siemens</div>
      <div class="vrow"><div class="vdot" style="background:#10b981"></div>Philips</div>
      <div class="vrow"><div class="vdot" style="background:#f59e0b"></div>GE</div>
      <div class="vrow"><div class="vdot" style="background:#f472b6"></div>Canon</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="tb-l">MRI Parameter Guide <strong id="plabel">· 전체 부위</strong></div>
      <div class="tb-r"><div class="live"></div>AI 응답 준비됨</div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat" id="chat">
        <div class="empty" id="empty">
          <div class="empty-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div>
          <div><h2>파라미터 질문을 입력하세요</h2><p>부위를 선택하고 예시를 눌러 시작하거나, 이미지를 드래그해서 artifact 분석을 받아보세요.</p></div>
          <div class="qgrid">
            <button class="qb" onclick="fill('Brain T1WI TR별 적정 TI값은?')"><span class="ql">Brain · TI</span>TR별 적정 TI값은?</button>
            <button class="qb" onclick="fill('FLAIR TR별 TI 권장값은?')"><span class="ql">Brain · FLAIR</span>FLAIR TR별 TI값은?</button>
            <button class="qb" onclick="fill('Brain Boundary artifact 원인과 해결법은?')"><span class="ql">Known Issue</span>Boundary artifact 해결법은?</button>
            <button class="qb" onclick="fill('TOF ICA artifact 원인과 해결법은?')"><span class="ql">Known Issue</span>TOF ICA artifact 해결법은?</button>
            <button class="qb" onclick="fill('Philips eTHRIVE Dynamic CS 주의사항은?')"><span class="ql">Philips</span>eTHRIVE CS 주의사항은?</button>
            <button class="qb" onclick="fill('Shoulder FS 불량 원인과 해결법은?')"><span class="ql">MSK</span>Shoulder FS 불량 해결법은?</button>
          </div>
        </div>
      </div>
      <div class="iarea">
        <div class="img-preview" id="imgPreview"></div>
        <div class="ibox">
          <label class="img-btn" for="imgInput" title="이미지 업로드">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </label>
          <input type="file" id="imgInput" accept="image/*" style="display:none">
          <textarea id="qi" placeholder="이미지 드래그·붙여넣기 또는 파라미터, artifact 질문하세요..." rows="1"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask();}"></textarea>
          <button class="sbtn" id="sbtn" onclick="ask()" aria-label="전송">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="hint"><kbd>Enter</kbd> 전송 · <kbd>Shift+Enter</kbd> 줄바꿈 · 이미지 드래그·붙여넣기로 artifact 분석</div>
      </div>
    </div>

    <!-- Issue DB Panel -->
    <div class="db-panel" id="dbPanel">
      <div class="db-toolbar">
        <input class="db-search" id="dbSearch" placeholder="artifact 이름, 원인, 해결방법 검색..." oninput="renderDB()">
        <div class="db-filter">
          <button class="df on" data-cat="all" onclick="setDBCat(this)">전체</button>
          <button class="df" data-cat="brain" onclick="setDBCat(this)">Brain</button>
          <button class="df" data-cat="spine" onclick="setDBCat(this)">Spine</button>
          <button class="df" data-cat="msk" onclick="setDBCat(this)">MSK</button>
          <button class="df" data-cat="field" onclick="setDBCat(this)">현장사례</button>
        </div>
      </div>
      <div class="db-content" id="dbContent"></div>
    </div>
  </div>
</div>

<script>
const ISSUES = {
  brain: [
    {name:'Boundary artifact (TR-TI)',cause:'TR과 TI 균형 깨짐 → ventricle/cortex 경계에 검은 윤곽선 발생',solution:'Siemens: freeze 기능으로 TR 변경시 TI 자동조정\nGE: TI Auto 설정\nPhilips: TI VALUE TABLE 참조하여 수동 입력',tip:'TR 9000 / TI 2500 기준 비율 유지'},
    {name:'TOF ICA Pseudo-stenosis',cause:'Intravoxel dephasing → ICA 신호소실 (협착으로 오인 가능)',solution:'AcqVoxelSlice 1.0 → 0.6mm 감소\nSlice Partial Fourier off (100%에 가깝게)\nSwiftMR 처리로 크게 개선 (super-resolution 효과)',tip:'in-plane 해상도 개선은 효과 미미, slice 방향이 핵심'},
    {name:'Venetian blind artifact (TOF)',cause:'slab 경계에서 신호 불균일 발생',solution:'overlap 증가'},
    {name:'PAT residual artifact (SENSE/ARC)',cause:'acceleration factor 과도',solution:'PAT factor 감소'},
    {name:'EPI distortion artifact (DWI)',cause:'B0 불균일 / FOV 과다',solution:'PAT factor 최대 3\nMUSE 사용\nFOV 350 이하 권장'},

const CAT_LABEL = {brain:'Brain / Neuro',spine:'Spine',msk:'MSK',field:'현장 이슈 사례'};
const CAT_TAG = {brain:'tag-brain',spine:'tag-spine',msk:'tag-msk',field:'tag-field'};
const CAT_NAME = {brain:'Brain',spine:'Spine',msk:'MSK',field:'현장사례'};

let part='all', busy=false, selectedImg=null, dbCat='all';

function switchTab(tab) {
  document.getElementById('chatPanel').style.display = tab==='chat' ? 'flex' : 'none';
  document.getElementById('dbPanel').classList.toggle('on', tab==='db');
  document.getElementById('tabChat').classList.toggle('on', tab==='chat');
  document.getElementById('tabDB').classList.toggle('on', tab==='db');
  if(tab==='db') renderDB();
}

function setPart(el) {
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  part=el.dataset.part;
  document.getElementById('plabel').textContent='· '+(part==='all'?'전체 부위':part);
}

function setDBCat(el) {
  document.querySelectorAll('.df').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  dbCat=el.dataset.cat;
  renderDB();
}

function renderDB() {
  const q = document.getElementById('dbSearch').value.toLowerCase();
  const content = document.getElementById('dbContent');
  let html = '';
  let total = 0;

  const cats = dbCat==='all' ? Object.keys(ISSUES) : [dbCat];
  cats.forEach(cat => {
    const items = ISSUES[cat].filter(i =>
      !q || i.name.toLowerCase().includes(q) || i.cause.toLowerCase().includes(q) || i.solution.toLowerCase().includes(q)
    );
    if(!items.length) return;
    total += items.length;
    html += `<div class="db-section">
      <div class="db-section-title">${CAT_LABEL[cat]} <span style="font-weight:400;color:var(--muted)">(${items.length}건)</span></div>
      <div class="db-grid">`;
    items.forEach((issue,idx) => {
      const id = `issue_${cat}_${idx}`;
      const sol = issue.solution.replace(/\n/g,'<br>');
      const tip = issue.tip ? `<div class="detail-row"><span class="detail-label" style="color:var(--blue);width:auto;margin-right:4px;">💡</span><span class="detail-val" style="color:var(--muted);font-size:11px;">${issue.tip}</span></div>` : '';
      html += `<div class="issue-card" id="${id}" onclick="toggleIssue('${id}','${cat}','${issue.name.replace(/'/g,"\\'")}')">
        <div><span class="issue-tag ${CAT_TAG[cat]}">${CAT_NAME[cat]}</span></div>
        <div class="issue-name">${issue.name}</div>
        <div class="issue-detail">
          <div class="detail-row"><span class="detail-label">원인</span><span class="detail-val">${issue.cause}</span></div>
          <div class="detail-row"><span class="detail-label">해결</span><span class="detail-val">${sol}</span></div>
          ${tip}
          <button class="ask-btn" onclick="askFromDB(event,'${issue.name.replace(/'/g,"\\'")}')">💬 이 이슈 AI에게 더 물어보기</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if(!total) html = `<div class="no-result">검색 결과가 없습니다.<br><span style="font-size:12px;color:var(--muted)">다른 키워드로 검색해보세요</span></div>`;
  content.innerHTML = html;
}

function toggleIssue(id, cat, name) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
}

function askFromDB(e, name) {
  e.stopPropagation();
  switchTab('chat');
  fill(`${name} 에 대해 더 자세히 설명해줘`);
}

function fill(t) {
  const ta=document.getElementById('qi');
  ta.value=t;ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';ta.focus();
}

function setImg(file) {
  const reader=new FileReader();
  reader.onload=ev=>{
    selectedImg={base64:ev.target.result.split(',')[1],mimeType:file.type};
    const p=document.getElementById('imgPreview');
    p.style.display='block';
    p.innerHTML=`<div style="position:relative;display:inline-block;">
      <img src="${ev.target.result}" style="max-height:75px;border-radius:7px;border:1px solid var(--bdr2);">
      <button onclick="clearImg()" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--muted);border:none;cursor:pointer;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>`;
  };
  reader.readAsDataURL(file);
}

function clearImg() {
  selectedImg=null;
  const p=document.getElementById('imgPreview');
  p.style.display='none';p.innerHTML='';
  document.getElementById('imgInput').value='';
}

document.getElementById('imgInput').addEventListener('change',e=>{if(e.target.files[0])setImg(e.target.files[0]);});
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files'))document.getElementById('dropOverlay').classList.add('on');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget||e.relatedTarget===document.documentElement)document.getElementById('dropOverlay').classList.remove('on');});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();document.getElementById('dropOverlay').classList.remove('on');
  const file=[...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));
  if(file)setImg(file);
});
document.addEventListener('paste',e=>{
  const item=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));
  if(item){const file=item.getAsFile();if(file)setImg(file);}
});

async function ask() {
  const ta=document.getElementById('qi');
  const q=ta.value.trim();
  if((!q&&!selectedImg)||busy)return;
  busy=true;document.getElementById('sbtn').disabled=true;
  const imgSnap=selectedImg;
  const displayQ=q||'이 MRI 이미지에서 artifact를 분석해주세요';
  const em=document.getElementById('empty');if(em)em.remove();
  const ch=document.getElementById('chat');
  const um=document.createElement('div');um.className='msg-u';
  if(imgSnap){
    um.innerHTML=`<div class="bubble" style="display:flex;flex-direction:column;gap:5px;max-width:70%;">
      <img src="data:${imgSnap.mimeType};base64,${imgSnap.base64}" style="max-width:200px;max-height:150px;border-radius:7px;object-fit:contain;">
      <span>${displayQ.replace(/</g,'&lt;')}</span></div>`;
  }else{um.innerHTML=`<div class="bubble">${q.replace(/</g,'&lt;')}</div>`;}
  ch.appendChild(um);
  ta.value='';ta.style.height='auto';clearImg();
  const msgId='ac_'+Date.now();
  const am=document.createElement('div');am.className='msg-a';
  am.innerHTML=`<div class="av"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8M12 8v8"/></svg></div>
    <div style="flex:1;min-width:0"><div class="acard loading" id="${msgId}">
      <div class="dots"><span></span><span></span><span></span></div>
      ${imgSnap?'MRI 이미지 분석 중...':'가이드라인 검색 중...'}
    </div></div>`;
  ch.appendChild(am);ch.scrollTop=ch.scrollHeight;
  const ctx=part!=='all'?`[${part}]\n`:'';
  const userMsg=ctx+(q||'이 MRI 이미지에서 artifact를 찾아 원인과 해결 방법을 알려주세요.');
  try{
    const body={system:SYS,messages:[{role:'user',content:userMsg}]};
    if(imgSnap)body.image=imgSnap;
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'HTTP '+r.status);
    const txt=d.content?.[0]?.text||'답변 없음';
    const ac=document.getElementById(msgId);
    if(ac){ac.classList.remove('loading');ac.innerHTML=fmt(txt);}
  }catch(e){
    const ac=document.getElementById(msgId);
    if(ac){ac.classList.remove('loading');ac.innerHTML=`<span style="color:#f87171">오류: ${e.message}</span>`;}
  }
  busy=false;document.getElementById('sbtn').disabled=false;ch.scrollTop=ch.scrollHeight;
}

function fmt(t){
  return t
    .replace(/\*\*(Siemens[^*]*)\*\*/g,'<span class="vtag vs">$1</span>')
    .replace(/\*\*(Philips[^*]*)\*\*/g,'<span class="vtag vp">$1</span>')
    .replace(/\*\*(GE[^*]*)\*\*/g,'<span class="vtag vg">$1</span>')
    .replace(/\*\*(Canon[^*]*)\*\*/g,'<span class="vtag vc">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<h4>$1</h4>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[^<]*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
}
